<!DOCTYPE html>
<html>
<head>
  <title>Ally Relink Tool</title>
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
</head>
<body>
  <h2>Ally Account Relink Tool</h2>
  <div id="status">Initializing...</div>
  <div id="result" style="font-size:20px; font-weight:bold; margin-top:20px;"></div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var linkToken = params.get('link_token') || localStorage.getItem('plaid_link_token');

    if (linkToken) {
      localStorage.setItem('plaid_link_token', linkToken);
    }

    function resumeLink(linkToken) {
      var config = {
        token: linkToken,
        onSuccess: function(public_token, metadata) {
          document.getElementById('status').innerText = 'Login successful! Sending to Retool...';
          
          fetch('https://samgray.retool.com/url/plaid', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ public_token: public_token })
          })
          .then(function(response) {
            document.getElementById('status').innerText = 'Success! You can close this tab and return to Retool.';
          })
          .catch(function(err) {
            document.getElementById('status').innerText = 'Error sending to Retool: ' + err;
            document.getElementById('result').innerText = 'Public Token: ' + public_token;
          });
        },
        onExit: function(err, metadata) {
          if (err) {
            document.getElementById('status').innerText = 'Error: ' + JSON.stringify(err);
          }
        }
      };

      if (window.location.search.includes('oauth_state_id')) {
        config.receivedRedirectUri = window.location.href;
      }

      var handler = Plaid.create(config);
      handler.open();
    }

    if (linkToken) {
      resumeLink(linkToken);
    } else {
      document.getElementById('status').innerText = 'Error: No link_token found.';
    }
  </script>
</body>
</html>
